kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: ChartPlanJSON
    description: JSON string containing the chart plan to render, including chartType, titles, and the selected chart data payload.
    shouldPromptUser: true

modelDescription: Use this topic when a dataset has already been selected and normalized for charting. The topic accepts a chart plan JSON payload and returns an Adaptive Card chart such as bar, pie, line, grouped, stacked, or gauge. Do not use this topic to fetch data.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: ParseValue
      id: jdELeF
      variable: Topic.ChartPlan
      valueType:
        kind: Record
        properties:
          chartType: String
          colorSet: String
          data:
            type:
              kind: Table
              properties:
                legend: String
                values:
                  type:
                    kind: Table
                    properties:
                      x: String
                      y: Number

          normalizedRows:
            type:
              kind: Table
              properties:
                category: String
                series: String
                value: Number

          segments:
            type:
              kind: Table
              properties:
                legend: String
                size: Number

          stackedBarData:
            type:
              kind: Table
              properties:
                data:
                  type:
                    kind: Table
                    properties:
                      color: String
                      legend: String
                      value: Number

                title: String

          title: String
          value: Number
          xAxisTitle: String
          yAxisTitle: String

      value: =Topic.ChartPlanJSON

    - kind: SetVariable
      id: setVariable_HAvFmr
      variable: Topic.ChartType
      value: =Lower(Text(Topic.ChartPlan.chartType))

    - kind: SetVariable
      id: setVariable_7c3ovQ
      variable: Topic.ChartTitle
      value: =Coalesce(Text(Topic.ChartPlan.title), "Results")

    - kind: SetVariable
      id: setVariable_Fo45gt
      variable: Topic.XAxisTitle
      value: =Coalesce(Text(Topic.ChartPlan.xAxisTitle), "Category")

    - kind: SetVariable
      id: setVariable_lkyrWZ
      variable: Topic.YAxisTitle
      value: =Coalesce(Text(Topic.ChartPlan.yAxisTitle), "Value")

    - kind: SetVariable
      id: setVariable_XAnf8w
      variable: Topic.ColorSet
      value: =Coalesce(Text(Topic.ChartPlan.colorSet), "categorical")

    - kind: ConditionGroup
      id: conditionGroup_BN1qbm
      conditions:
        - id: conditionItem_V8wElf
          condition: =Topic.ChartType = "horizontalbar"
          actions:
            - kind: SetVariable
              id: setVariable_5Aojgq
              variable: Topic.CardJSON
              value: |-
                ={
                    type: "AdaptiveCard",
                    version: "1.5",
                    body: [
                        {
                            type: "Chart.HorizontalBar",
                            title: Text(Topic.ChartTitle),
                            xAxisTitle: Text(Topic.XAxisTitle),
                            yAxisTitle: Text(Topic.YAxisTitle),
                            colorSet: Text(Topic.ColorSet),
                            data: ForAll(
                                Topic.ChartPlan.normalizedRows,
                                {
                                    x: Text(ThisRecord.category),
                                    y: Value(ThisRecord.value)
                                }
                            )
                        }
                    ]
                }

    - kind: SendActivity
      id: sendActivity_X31rux
      activity:
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: =Topic.CardJSON

inputType:
  properties:
    ChartPlanJSON:
      displayName: ChartPlanJSON
      description: JSON string containing the chart plan to render, including chartType, titles, and the selected chart data payload.
      type: String

outputType: {}