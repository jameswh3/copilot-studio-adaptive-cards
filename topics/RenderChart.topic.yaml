kind: AdaptiveDialog
description: Only use this topic when ChartPlanJSON has already been fully normalized by Prepare Chart Data or another orchestration step. Do not use it for raw user chart requests.

inputType:
  properties:
    ChartPlanJSON:
      displayName: Chart Plan JSON
      description: JSON string containing the chart plan to render, including chartType, titles, and the selected chart data payload.
      type:
        kind: String

outputType: {}

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Render Chart
    triggerQueries:
      - render chart from plan
      - display chart from normalized plan
      - build adaptive card chart from chart plan
      - render chart plan json

  actions:
    - kind: ParseValue
      id: setChartPlan
      variable: Topic.ChartPlan
      valueType:
        kind: Record
        properties:
          chartType: String
          colorSet: String
          data:
            type:
              kind: Table
              properties:
                legend: String
                values:
                  type:
                    kind: Table
                    properties:
                      x: String
                      y: Number
          normalizedRows:
            type:
              kind: Table
              properties:
                category: String
                series: String
                value: Number
          stackedBarData:
            type:
              kind: Table
              properties:
                category: String
                title: String
                data:
                  type:
                    kind: Table
                    properties:
                      color: String
                      legend: String
                      label: String
                      value: Number
                segments:
                  type:
                    kind: Table
                    properties:
                      color: String
                      legend: String
                      label: String
                      value: Number
          title: String
          xAxisTitle: String
          yAxisTitle: String
      value: =Topic.ChartPlanJSON

    - kind: SetVariable
      id: setChartType
      variable: Topic.ChartType
      value: =Lower(Text(Topic.ChartPlan.chartType))

    - kind: SetVariable
      id: setChartTitle
      variable: Topic.ChartTitle
      value: =Coalesce(Text(Topic.ChartPlan.title), "Results")

    - kind: SetVariable
      id: setXAxisTitle
      variable: Topic.XAxisTitle
      value: =Coalesce(Text(Topic.ChartPlan.xAxisTitle), "Category")

    - kind: SetVariable
      id: setYAxisTitle
      variable: Topic.YAxisTitle
      value: =Coalesce(Text(Topic.ChartPlan.yAxisTitle), "Value")

    - kind: SetVariable
      id: setColorSet
      variable: Topic.ColorSet
      value: =Coalesce(Text(Topic.ChartPlan.colorSet), "categorical")

    - kind: ConditionGroup
      id: routeChartType
      conditions:
        - id: isHorizontalBar
          condition: =Topic.ChartType = "horizontalbar"
          actions:
            - kind: SendActivity
              id: sendHorizontalBar
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                          type: "AdaptiveCard",
                          version: "1.5",
                          body: [
                              {
                                  type: "Chart.HorizontalBar",
                                  title: Text(Topic.ChartTitle),
                                  xAxisTitle: Text(Topic.XAxisTitle),
                                  yAxisTitle: Text(Topic.YAxisTitle),
                                  colorSet: Text(Topic.ColorSet),
                                  data: ForAll(
                                      Topic.ChartPlan.normalizedRows,
                                      {
                                          x: Text(ThisRecord.category),
                                          y: Value(ThisRecord.value)
                                      }
                                  )
                              }
                          ]
                      }

        - id: isPie
          condition: =Topic.ChartType = "pie"
          actions:
            - kind: SendActivity
              id: sendPie
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                          type: "AdaptiveCard",
                          version: "1.5",
                          body: [
                              {
                                  type: "Chart.Pie",
                                  title: Text(Topic.ChartTitle),
                                  colorSet: Text(Topic.ColorSet),
                                  data: ForAll(
                                      Topic.ChartPlan.normalizedRows,
                                      {
                                          legend: Text(ThisRecord.category),
                                          value: Value(ThisRecord.value)
                                      }
                                  )
                              }
                          ]
                      }

        - id: isLine
          condition: =Topic.ChartType = "line"
          actions:
            - kind: SendActivity
              id: sendLine
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                          type: "AdaptiveCard",
                          version: "1.5",
                          body: [
                              {
                                  type: "Chart.Line",
                                  title: Text(Topic.ChartTitle),
                                  xAxisTitle: Text(Topic.XAxisTitle),
                                  yAxisTitle: Text(Topic.YAxisTitle),
                                  colorSet: Text(Topic.ColorSet),
                                  data: ForAll(
                                      Topic.ChartPlan.data As series,
                                      {
                                          legend: Text(series.legend),
                                          values: ForAll(
                                              series.values As point,
                                              {
                                                  x: Text(point.x),
                                                  y: Value(point.y)
                                              }
                                          )
                                      }
                                  )
                              }
                          ]
                      }

        - id: isVerticalBarGrouped
          condition: =Topic.ChartType = "verticalbargrouped"
          actions:
            - kind: SendActivity
              id: sendVerticalBarGrouped
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                          type: "AdaptiveCard",
                          version: "1.5",
                          body: [
                              {
                                  type: "Chart.VerticalBar.Grouped",
                                  title: Text(Topic.ChartTitle),
                                  xAxisTitle: Text(Topic.XAxisTitle),
                                  yAxisTitle: Text(Topic.YAxisTitle),
                                  colorSet: Text(Topic.ColorSet),
                                  data: ForAll(
                                      Topic.ChartPlan.data As series,
                                      {
                                          legend: Text(series.legend),
                                          values: ForAll(
                                              series.values As point,
                                              {
                                                  x: Text(point.x),
                                                  y: Value(point.y)
                                              }
                                          )
                                      }
                                  )
                              }
                          ]
                      }

        - id: isVerticalBarStacked
          condition: =Topic.ChartType = "verticalbarstacked"
          actions:
            - kind: SendActivity
              id: sendVerticalBarStacked
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                          type: "AdaptiveCard",
                          version: "1.5",
                          body: [
                              {
                                  type: "Chart.VerticalBar.Grouped",
                                  stacked: true,
                                  title: Text(Topic.ChartTitle),
                                  xAxisTitle: Text(Topic.XAxisTitle),
                                  yAxisTitle: Text(Topic.YAxisTitle),
                                  colorSet: Text(Topic.ColorSet),
                                  data: ForAll(
                                      Topic.ChartPlan.data As series,
                                      {
                                          legend: Text(series.legend),
                                          values: ForAll(
                                              series.values As point,
                                              {
                                                  x: Text(point.x),
                                                  y: Value(point.y)
                                              }
                                          )
                                      }
                                  )
                              }
                          ]
                      }

        - id: isHorizontalBarStacked
          condition: =Topic.ChartType = "horizontalbarstacked"
          actions:
            - kind: SendActivity
              id: sendHorizontalBarStacked
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                          type: "AdaptiveCard",
                          version: "1.5",
                          body: [
                              {
                                  type: "Chart.HorizontalBar.Stacked",
                                  title: Text(Topic.ChartTitle),
                                  data: ForAll(
                                      Topic.ChartPlan.stackedBarData As bar,
                                      {
                                          title: Coalesce(Text(bar.title), Text(bar.category)),
                                          data: If(
                                              CountRows(bar.data) > 0,
                                              ForAll(
                                                  bar.data As segment,
                                                  {
                                                      legend: Coalesce(Text(segment.legend), Text(segment.label)),
                                                      value: Value(segment.value),
                                                      color: Text(segment.color)
                                                  }
                                              ),
                                              ForAll(
                                                  bar.segments As segment,
                                                  {
                                                      legend: Coalesce(Text(segment.legend), Text(segment.label)),
                                                      value: Value(segment.value),
                                                      color: Text(segment.color)
                                                  }
                                              )
                                          )
                                      }
                                  )
                              }
                          ]
                      }


      elseActions:
        - kind: SendMessage
          id: unsupportedChartType
          message: I could not determine a supported chart type from the chart plan.
